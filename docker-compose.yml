
services:
  postgres:
    image: postgres:13
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./sql:/docker-entrypoint-initdb.d  # initialize DB with schema.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nifi:
    image: apache/nifi:1.20.0
    container_name: nifi_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      NIFI_WEB_HTTP_PORT: 8080
    volumes:
      - ./data:/data
      - ./drivers/postgresql-42.7.10.jar:/opt/nifi/nifi-current/lib/postgresql-42.7.10.jar
      - ./archive:/archive

volumes:
  postgres_data: